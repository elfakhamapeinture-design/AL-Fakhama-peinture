<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة إدارة — الفخامة للدهن</title>
<link rel="icon" id="favicon" type="image/webp" href="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#201D1A; --canvas:#FAF6EF; --canvas-warm:#F1E7D6; --brass:#B8862E;
    --terracotta:#B24B32; --teal:#1F5F58; --sage:#6E7F52; --muted:#7A7266;
    --line:rgba(32,29,26,0.10); --shadow:0 10px 30px rgba(32,29,26,0.10);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--canvas);color:var(--ink);font-family:'Tajawal',sans-serif;}
  h1,h2,h3{font-family:'El Messiri',serif;margin:0;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .top{background:var(--ink);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;}
  .brand{font-family:'El Messiri',serif;font-weight:700;font-size:20px;display:flex;align-items:center;gap:10px;}
  .brand-mark{width:28px;height:28px;border-radius:7px;background:conic-gradient(from 200deg,var(--terracotta),#D9A441,var(--teal),#5B3A5C);}
  .btn{padding:9px 16px;border-radius:9px;font-weight:700;font-size:13.5px;}
  .btn-ghost{background:transparent;border:1.5px solid #fff;color:#fff;}
  .btn-brass{background:var(--brass);color:#fff;}
  .body{max-width:1180px;margin:0 auto;padding:30px 24px 70px;}
  .login-box{max-width:360px;margin:80px auto;background:#fff;padding:34px;border-radius:16px;box-shadow:var(--shadow);text-align:center;}
  .login-box input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--line);font-size:14px;margin-bottom:14px;}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px;}
  .tab-btn{padding:9px 16px;border-radius:10px;background:#fff;border:1.5px solid var(--line);font-weight:700;font-size:13.5px;}
  .tab-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px;margin-bottom:30px;}
  .stat-card{background:#fff;border-radius:14px;padding:20px;box-shadow:var(--shadow);border-top:4px solid var(--brass);}
  .stat-card.warn{border-top-color:var(--terracotta);}
  .stat-card b{font-family:'El Messiri',serif;font-size:26px;display:block;}
  .stat-card span{color:var(--muted);font-size:13px;}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
  th,td{padding:12px 14px;text-align:right;font-size:13.5px;border-bottom:1px solid var(--line);}
  th{background:var(--canvas-warm);font-weight:800;}
  .mini-btn{padding:6px 10px;border-radius:7px;font-size:12px;font-weight:700;}
  .mini-brass{background:var(--brass);color:#fff;}
  .mini-red{background:#f6dcd4;color:var(--terracotta);}
  .mini-input{width:75px;padding:6px 8px;border-radius:6px;border:1.5px solid var(--line);}
  .admin-form{background:#fff;border-radius:14px;padding:20px;box-shadow:var(--shadow);margin-bottom:24px;}
  .admin-form .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
  .admin-form input,.admin-form select{padding:9px 12px;border-radius:8px;border:1.5px solid var(--line);font-family:inherit;font-size:13.5px;}
  .low-flag{color:var(--terracotta);font-weight:800;}
  .empty-note{color:var(--muted);text-align:center;padding:30px 0;}
  .pay-full{color:var(--sage);font-weight:800;}
  .pay-partial{color:#8a6a1f;font-weight:800;}
  .pay-none{color:var(--terracotta);font-weight:800;}
  img.gal-thumb{width:60px;height:44px;object-fit:cover;border-radius:6px;}
</style>
</head>
<body>

<div class="top">
  <div class="brand"><img id="logoImg" src="" alt="" style="display:none;width:26px;height:26px;border-radius:7px;object-fit:cover;"><div class="brand-mark" id="logoFallback"></div>لوحة إدارة الفخامة للدهن</div>
  <a class="btn btn-ghost" href="index.html">العودة للموقع</a>
</div>

<div class="body">
  <div id="loginView">
    <div class="login-box">
      <h2 style="margin-bottom:6px;">دخول الإدارة</h2>
      <p style="color:var(--muted);font-size:13.5px;margin-bottom:20px;">أدخل كلمة المرور للوصول إلى لوحة التحكم</p>
      <input type="password" id="adminPass" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn btn-brass" style="width:100%;" onclick="doLogin()">دخول</button>
      <p id="loginErr" style="color:var(--terracotta);font-size:13px;margin-top:10px;display:none;">كلمة المرور غير صحيحة</p>
    </div>
  </div>

  <div id="dashView" style="display:none;">
    <div class="tabs">
      <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">نظرة عامة</button>
      <button class="tab-btn" data-tab="products" onclick="switchTab('products')">المنتجات</button>
      <button class="tab-btn" data-tab="warehouse" onclick="switchTab('warehouse')">المستودع</button>
      <button class="tab-btn" data-tab="gallery" onclick="switchTab('gallery')">معرض الأعمال</button>
      <button class="tab-btn" data-tab="orders" onclick="switchTab('orders')">الطلبات والديون</button>
      <button class="tab-btn" data-tab="finance" onclick="switchTab('finance')">المصريف</button>
      <button class="tab-btn" data-tab="craftsmen" onclick="switchTab('craftsmen')">الحرفيون</button>
      <button class="tab-btn" data-tab="messages" onclick="switchTab('messages')">الرسائل</button>
      <button class="tab-btn" data-tab="applications" onclick="switchTab('applications')">طلبات الانضمام</button>
    </div>
    <div id="tabContent"><div class="empty-note">جاري التحميل...</div></div>
  </div>
</div>

<script>

document.getElementById('favicon').href = LOGO_URL;
document.getElementById('logoImg').src = LOGO_URL;
document.getElementById('logoImg').style.display = 'block';
document.getElementById('logoFallback').style.display = 'none';
const ADMIN_KEY = "alfakhama-2026-x7q"; // يجب أن يطابق ADMIN_KEY في ملف .gs
const LOGIN_PASSWORD = "admin123"; // غيّرها لكلمة مرور خاصة بك

let DB = { products:[], craftsmen:[], orders:[], messages:[], finance:[], gallery:[], applications:[] };

function doLogin(){
  if(document.getElementById('adminPass').value === LOGIN_PASSWORD){
    document.getElementById('loginView').style.display='none';
    document.getElementById('dashView').style.display='block';
    refreshAll();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}

async function refreshAll(){
  document.getElementById('tabContent').innerHTML = '<div class="empty-note">جاري تحميل البيانات من جوجل شيت...</div>';
  try{
    const res = await fetch(SHEET_API_URL + '?key=' + encodeURIComponent(ADMIN_KEY));
    const data = await res.json();
    DB.products = (data.products||[]).map(p=>({...p, id:Number(p.id), price:Number(p.price), stock:Number(p.stock)}));
    DB.craftsmen = (data.craftsmen||[]).map(c=>({...c, id:Number(c.id)}));
    DB.orders = (data.orders||[]).map(o=>({...o, id:Number(o.id), total:Number(o.total), paid:Number(o.paid), remaining:Number(o.remaining), items:JSON.parse(o.itemsJson||'[]')}));
    DB.messages = data.messages||[];
    DB.finance = (data.finance||[]).map(f=>({...f, id:Number(f.id), amount:Number(f.amount)}));
    DB.gallery = (data.gallery||[]).map(g=>({...g, id:Number(g.id)}));
    DB.applications = data.applications||[];
    switchTab('overview');
  }catch(err){
    document.getElementById('tabContent').innerHTML = '<div class="empty-note">تعذّر تحميل البيانات. تحقق من رابط SHEET_API_URL والاتصال بالإنترنت.</div>';
    console.error(err);
  }
}

async function callApi(action, payload){
  try{
    const res = await fetch(SHEET_API_URL, { method:'POST', body: JSON.stringify({action, key:ADMIN_KEY, ...payload}) });
    return await res.json();
  }catch(err){
    console.error(err);
    return {ok:false};
  }
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  const c = document.getElementById('tabContent');
  if(tab==='overview')   c.innerHTML = renderOverview();
  if(tab==='products')   c.innerHTML = renderProducts();
  if(tab==='warehouse')  c.innerHTML = renderWarehouse();
  if(tab==='gallery')    c.innerHTML = renderGallery();
  if(tab==='orders')     c.innerHTML = renderOrders();
  if(tab==='finance')    c.innerHTML = renderFinance();
  if(tab==='craftsmen')  c.innerHTML = renderCraftsmen();
  if(tab==='messages')   c.innerHTML = renderMessages();
  if(tab==='applications') c.innerHTML = renderApplications();
}

function fmt(n){ return (Number(n)||0).toLocaleString('ar-DZ') + ' دج'; }
function esc(s){ return String(s??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ---------- نظرة عامة ---------- */
function renderOverview(){
  const income = DB.finance.filter(f=>f.type==='income').reduce((a,f)=>a+f.amount,0);
  const expense = DB.finance.filter(f=>f.type==='expense').reduce((a,f)=>a+f.amount,0);
  const lowStock = DB.products.filter(p=>p.stock<=5).length;
  const totalDebt = DB.orders.reduce((s,o)=>s+o.remaining,0);
  return `<div class="stat-grid">
    <div class="stat-card"><b>${DB.orders.length}</b><span>عدد الطلبات</span></div>
    <div class="stat-card"><b>${fmt(income-expense)}</b><span>الرصيد الصافي</span></div>
    <div class="stat-card warn"><b>${fmt(totalDebt)}</b><span>إجمالي الديون على العملاء</span></div>
    <div class="stat-card ${lowStock>0?'warn':''}"><b>${lowStock}</b><span>منتجات كميتها منخفضة</span></div>
    <div class="stat-card"><b>${DB.craftsmen.filter(c=>c.status==='free').length}</b><span>حرفيون متاحون الآن</span></div>
    <div class="stat-card"><b>${DB.messages.length}</b><span>رسائل واردة</span></div>
  </div>
  <button class="btn btn-brass" onclick="refreshAll()">🔄 تحديث البيانات</button>`;
}

/* ---------- المنتجات ---------- */
function renderProducts(){
  setTimeout(()=>{
    document.getElementById('addProductBtn')?.addEventListener('click', addProduct);
  },0);
  return `<div class="admin-form">
    <h3 style="margin-bottom:12px;">إضافة منتج جديد</h3>
    <div class="row">
      <input id="npName" placeholder="اسم المنتج">
      <input id="npDesc" placeholder="وصف مختصر">
      <input id="npPrice" type="number" placeholder="السعر (دج)">
      <input id="npStock" type="number" placeholder="الكمية بالمستودع">
      <button class="btn btn-brass" id="addProductBtn">إضافة</button>
    </div>
  </div>
  <table><thead><tr><th>المنتج</th><th>السعر</th><th>المخزون</th><th>إجراء</th></tr></thead>
  <tbody>${DB.products.map(p=>`<tr>
    <td>${esc(p.name)}</td><td>${fmt(p.price)}</td>
    <td class="${p.stock<=5?'low-flag':''}">${p.stock}</td>
    <td><button class="mini-btn mini-red" onclick="deleteProduct(${p.id})">حذف</button></td>
  </tr>`).join('') || '<tr><td colspan="4">لا توجد منتجات</td></tr>'}</tbody></table>`;
}
async function addProduct(){
  const name = document.getElementById('npName').value.trim();
  const desc = document.getElementById('npDesc').value.trim();
  const price = parseFloat(document.getElementById('npPrice').value);
  const stock = parseInt(document.getElementById('npStock').value);
  if(!name||!price||!stock){ alert('أكمل جميع الحقول'); return; }
  const palette = ['#B24B32','#1F5F58','#D9A441','#5B3A5C','#6E7F52'];
  const colors = [palette[Math.floor(Math.random()*5)]];
  const res = await callApi('addProduct', {name, desc, price, stock, colors, top:'linear-gradient(120deg,#332E28,#201D1A)'});
  if(res.ok){ await refreshAll(); switchTab('products'); } else alert('فشلت الإضافة');
}
async function deleteProduct(id){
  if(!confirm('تأكيد حذف هذا المنتج؟')) return;
  const res = await callApi('deleteProduct', {id});
  if(res.ok){ await refreshAll(); switchTab('products'); }
}

/* ---------- المستودع ---------- */
function renderWarehouse(){
  return `<table><thead><tr><th>المنتج</th><th>الكمية الحالية</th><th>تعديل الكمية</th></tr></thead>
  <tbody>${DB.products.map(p=>`<tr>
    <td>${esc(p.name)}</td>
    <td class="${p.stock<=5?'low-flag':''}">${p.stock} ${p.stock<=5?'⚠️':''}</td>
    <td><input class="mini-input" type="number" id="stock-${p.id}" value="${p.stock}">
      <button class="mini-btn mini-brass" onclick="updateStock(${p.id})">تحديث</button></td>
  </tr>`).join('') || '<tr><td colspan="3">لا توجد منتجات</td></tr>'}</tbody></table>`;
}
async function updateStock(id){
  const val = parseInt(document.getElementById('stock-'+id).value);
  const res = await callApi('updateStock', {id, stock:val});
  if(res.ok){ await refreshAll(); switchTab('warehouse'); }
}

/* ---------- معرض الأعمال ---------- */
function renderGallery(){
  return `<div class="admin-form">
    <h3 style="margin-bottom:12px;">إضافة صورة للمعرض</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:10px;">استخدم رابط صورة مباشر (من Google Drive بصيغة مشاركة عامة، أو Imgur، أو أي استضافة صور).</p>
    <div class="row">
      <input id="ngTitle" placeholder="عنوان الصورة (مثال: صالون بلمسة ذهبية)">
      <input id="ngImage" placeholder="رابط الصورة المباشر (https://...)">
      <button class="btn btn-brass" onclick="addGallery()">إضافة للمعرض</button>
    </div>
  </div>
  <table><thead><tr><th>معاينة</th><th>العنوان</th><th>إجراء</th></tr></thead>
  <tbody>${DB.gallery.map(g=>`<tr>
    <td>${g.image && String(g.image).startsWith('http') ? `<img class="gal-thumb" src="${esc(g.image)}">` : '—'}</td>
    <td>${esc(g.title)}</td>
    <td><button class="mini-btn mini-red" onclick="deleteGallery(${g.id})">حذف</button></td>
  </tr>`).join('') || '<tr><td colspan="3">لا توجد صور بعد</td></tr>'}</tbody></table>`;
}
async function addGallery(){
  const title = document.getElementById('ngTitle').value.trim();
  const image = document.getElementById('ngImage').value.trim();
  if(!title || !image){ alert('أكمل العنوان ورابط الصورة'); return; }
  const res = await callApi('addGallery', {title, image});
  if(res.ok){ await refreshAll(); switchTab('gallery'); } else alert('فشلت الإضافة');
}
async function deleteGallery(id){
  if(!confirm('حذف هذه الصورة من المعرض؟')) return;
  const res = await callApi('deleteGallery', {id});
  if(res.ok){ await refreshAll(); switchTab('gallery'); }
}

/* ---------- الطلبات والديون ---------- */
function renderOrders(){
  if(DB.orders.length===0) return '<div class="empty-note">لا توجد طلبات بعد</div>';
  return `<table><thead><tr><th>رقم</th><th>الزبون</th><th>الهاتف</th><th>التاريخ</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>تسجيل دفعة</th></tr></thead>
  <tbody>${DB.orders.map(o=>{
    const cls = o.remaining<=0?'pay-full':(o.paid>0?'pay-partial':'pay-none');
    const label = o.remaining<=0?'مدفوع بالكامل':(o.paid>0?'جزئي':'غير مدفوع');
    return `<tr>
      <td>#${o.id}</td><td>${esc(o.name)}</td><td>${esc(o.phone)}</td>
      <td>${formatDate(o.date)}</td><td>${fmt(o.total)}</td>
      <td>${fmt(o.paid)}</td>
      <td class="${cls}">${fmt(o.remaining)} <br><small>${label}</small></td>
      <td><input class="mini-input" type="number" id="paid-${o.id}" placeholder="مبلغ">
        <button class="mini-btn mini-brass" onclick="updatePayment(${o.id})">تسجيل</button></td>
    </tr>`;
  }).join('')}</tbody></table>`;
}
async function updatePayment(id){
  const val = parseFloat(document.getElementById('paid-'+id).value);
  if(isNaN(val)){ alert('أدخل مبلغًا صحيحًا'); return; }
  const res = await callApi('updatePayment', {id, paid: val});
  if(res.ok){ await refreshAll(); switchTab('orders'); }
}
function formatDate(d){ try{ return new Date(d).toLocaleDateString('ar-DZ'); }catch(e){ return d||''; } }

/* ---------- المصريف ---------- */
function renderFinance(){
  const income = DB.finance.filter(f=>f.type==='income').reduce((a,f)=>a+f.amount,0);
  const expense = DB.finance.filter(f=>f.type==='expense').reduce((a,f)=>a+f.amount,0);
  return `<div class="stat-grid">
    <div class="stat-card"><b>${fmt(income)}</b><span>إجمالي الإيرادات</span></div>
    <div class="stat-card warn"><b>${fmt(expense)}</b><span>إجمالي المصروفات</span></div>
    <div class="stat-card"><b>${fmt(income-expense)}</b><span>الرصيد الصافي</span></div>
  </div>
  <div class="admin-form">
    <h3 style="margin-bottom:12px;">إضافة حركة مالية</h3>
    <div class="row">
      <select id="fType"><option value="income">إيراد</option><option value="expense">مصروف</option></select>
      <input id="fLabel" placeholder="الوصف">
      <input id="fAmount" type="number" placeholder="المبلغ (دج)">
      <button class="btn btn-brass" onclick="addFinance()">إضافة</button>
    </div>
  </div>
  <table><thead><tr><th>النوع</th><th>الوصف</th><th>المبلغ</th></tr></thead>
  <tbody>${DB.finance.map(f=>`<tr><td>${f.type==='income'?'إيراد 🟢':'مصروف 🔴'}</td><td>${esc(f.label)}</td><td>${fmt(f.amount)}</td></tr>`).join('')}</tbody></table>`;
}
async function addFinance(){
  const type = document.getElementById('fType').value;
  const label = document.getElementById('fLabel').value.trim();
  const amount = parseFloat(document.getElementById('fAmount').value);
  if(!label||!amount){ alert('أكمل الحقول'); return; }
  const res = await callApi('addFinance', {type, label, amount});
  if(res.ok){ await refreshAll(); switchTab('finance'); }
}

/* ---------- الحرفيون ---------- */
function renderCraftsmen(){
  return `<table><thead><tr><th>الاسم</th><th>التخصص</th><th>الحالة</th><th>تغيير الحالة</th></tr></thead>
  <tbody>${DB.craftsmen.map(c=>`<tr>
    <td>${esc(c.name)}</td><td>${esc(c.spec)}</td><td>${c.status}</td>
    <td><select onchange="setCraftStatus(${c.id}, this.value)">
      <option value="free" ${c.status==='free'?'selected':''}>متاح الآن</option>
      <option value="busy" ${c.status==='busy'?'selected':''}>مشغول</option>
      <option value="tomorrow" ${c.status==='tomorrow'?'selected':''}>متاح غدًا</option>
    </select></td>
  </tr>`).join('') || '<tr><td colspan="4">لا يوجد حرفيون</td></tr>'}</tbody></table>`;
}
async function setCraftStatus(id, status){
  const res = await callApi('updateCraftStatus', {id, status});
  if(res.ok){ await refreshAll(); switchTab('craftsmen'); }
}

/* ---------- الرسائل ---------- */
function renderMessages(){
  if(DB.messages.length===0) return '<div class="empty-note">لا توجد رسائل بعد</div>';
  return `<table><thead><tr><th>الاسم</th><th>الهاتف</th><th>الحرفي المطلوب</th><th>الرسالة</th><th>التاريخ</th></tr></thead>
  <tbody>${DB.messages.map(m=>`<tr><td>${esc(m.name)}</td><td>${esc(m.phone)}</td><td>${esc(m.craft)}</td><td>${esc(m.msg)}</td><td>${formatDate(m.date)}</td></tr>`).join('')}</tbody></table>`;
}

/* ---------- طلبات الانضمام كحرفي ---------- */
function renderApplications(){
  if(DB.applications.length===0) return '<div class="empty-note">لا توجد طلبات انضمام بعد</div>';
  return `<table><thead><tr><th>الاسم</th><th>الهاتف</th><th>التخصص</th><th>الخبرة</th><th>نبذة</th><th>التاريخ</th></tr></thead>
  <tbody>${DB.applications.map(a=>`<tr>
    <td>${esc(a.name)}</td><td>${esc(a.phone)}</td><td>${esc(a.spec)}</td>
    <td>${esc(a.experience)} سنة</td><td>${esc(a.msg)}</td><td>${formatDate(a.date)}</td>
  </tr>`).join('')}</tbody></table>`;
}
