<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي وفواتيري — الفخامة للدهن</title>
<link rel="icon" id="favicon" type="image/webp" href="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#201D1A; --canvas:#FAF6EF; --canvas-warm:#F1E7D6; --brass:#B8862E;
    --terracotta:#B24B32; --teal:#1F5F58; --sage:#6E7F52; --muted:#7A7266;
    --card:#FFFFFF; --line:rgba(32,29,26,0.10); --shadow:0 10px 30px rgba(32,29,26,0.10);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--canvas);color:var(--ink);font-family:'Tajawal',sans-serif;line-height:1.6;}
  h1,h2,h3{font-family:'El Messiri',serif;margin:0;}
  a{color:var(--brass);}
  .wrap{max-width:820px;margin:0 auto;padding:0 20px;}
  header{padding:18px 0;border-bottom:1px solid var(--line);background:#fff;}
  .brand{display:flex;align-items:center;gap:10px;font-family:'El Messiri',serif;font-weight:700;font-size:20px;}
  .brand-mark{width:30px;height:30px;border-radius:8px;background:conic-gradient(from 200deg,var(--terracotta),#D9A441,var(--teal),#5B3A5C);}
  .back-link{font-size:13.5px;color:var(--muted);}
  main{padding:40px 0 70px;}
  .lookup-card{background:#fff;border-radius:18px;padding:30px;box-shadow:var(--shadow);border:1px solid var(--line);text-align:center;}
  .lookup-card h2{font-size:24px;margin-bottom:8px;}
  .lookup-card p{color:var(--muted);font-size:14px;margin-bottom:20px;}
  .lookup-row{display:flex;gap:10px;max-width:380px;margin:0 auto;}
  .lookup-row input{flex:1;padding:12px 14px;border-radius:10px;border:1.5px solid var(--line);font-size:15px;font-family:inherit;text-align:center;}
  .btn{padding:12px 22px;border-radius:10px;font-weight:700;font-size:14px;background:var(--brass);color:#fff;border:none;cursor:pointer;}
  .btn:hover{opacity:.92;}
  .btn-outline{background:#fff;border:1.5px solid var(--ink);color:var(--ink);}
  .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:28px 0;}
  @media(max-width:600px){.summary{grid-template-columns:1fr;}}
  .stat{background:#fff;border-radius:14px;padding:18px;text-align:center;box-shadow:var(--shadow);border-top:4px solid var(--brass);}
  .stat b{font-family:'El Messiri',serif;font-size:22px;display:block;}
  .stat span{font-size:12.5px;color:var(--muted);}
  .stat.debt{border-top-color:var(--terracotta);}
  .order-card{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:14px;}
  .order-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .order-head b{font-size:15px;}
  .order-head span{font-size:12.5px;color:var(--muted);}
  .order-items{font-size:13.5px;color:#444;margin-bottom:10px;}
  .order-items div{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--line);}
  .order-foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .pay-tag{font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;}
  .pay-full{background:#e7f0e1;color:var(--sage);}
  .pay-partial{background:#f2e6ce;color:#8a6a1f;}
  .pay-none{background:#fbe9e4;color:var(--terracotta);}
  .empty-note{color:var(--muted);text-align:center;padding:40px 0;}
  .loader{text-align:center;color:var(--muted);padding:30px 0;}

  /* الفاتورة */
  #invoiceArea{display:none;}
  @media print{
    body *{visibility:hidden;}
    #invoiceArea, #invoiceArea *{visibility:visible;}
    #invoiceArea{display:block !important;position:absolute;top:0;right:0;left:0;padding:30px;}
    .no-print{display:none !important;}
  }
  .invoice-box{border:2px solid var(--ink);border-radius:10px;padding:24px;max-width:600px;margin:0 auto;}
  .invoice-box h2{text-align:center;margin-bottom:4px;}
  .invoice-box .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:18px;}
  .invoice-box table{width:100%;border-collapse:collapse;margin:14px 0;}
  .invoice-box th,.invoice-box td{border:1px solid var(--line);padding:8px 10px;font-size:13.5px;text-align:right;}
  .invoice-box th{background:var(--canvas-warm);}
  .invoice-totals{margin-top:10px;font-size:14px;}
  .invoice-totals div{display:flex;justify-content:space-between;padding:4px 0;}
</style>
</head>
<body>

<header class="no-print">
  <div class="wrap" style="display:flex;justify-content:space-between;align-items:center;">
    <div class="brand"><img id="logoImg" src="" alt="" style="display:none;width:30px;height:30px;border-radius:8px;object-fit:cover;"><div class="brand-mark" id="logoFallback"></div>الفخامة للدهن</div>
    <a class="back-link" href="index.html">← العودة للموقع</a>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="lookup-card no-print">
      <h2>حسابي وفواتيري</h2>
      <p>أدخل رقم الهاتف الذي استخدمته عند الطلب لعرض مشترياتك والمبالغ المتبقية.</p>
      <div class="lookup-row">
        <input id="phoneInput" placeholder="05********" inputmode="tel">
        <button class="btn" onclick="lookup()">بحث</button>
      </div>
    </div>

    <div id="resultsArea" style="margin-top:30px;"></div>
    <div id="invoiceArea"></div>
  </div>
</main>

<script>
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxYolR9DUT8iwP9az5N7638BCDcM5lWmTBKJI4RTPdaJehqqe69eoXZTxbNRMZH1pHBSg/exec";

document.getElementById('favicon').href = LOGO_URL;
document.getElementById('logoImg').src = LOGO_URL;
document.getElementById('logoImg').style.display = 'block';
document.getElementById('logoFallback').style.display = 'none';
let lastOrders = [];
let lastPhone = '';

document.getElementById('phoneInput').addEventListener('keydown', e=>{ if(e.key==='Enter') lookup(); });

async function lookup(){
  const phone = document.getElementById('phoneInput').value.trim();
  const area = document.getElementById('resultsArea');
  if(!phone){ area.innerHTML = '<div class="empty-note">الرجاء إدخال رقم الهاتف</div>'; return; }
  area.innerHTML = '<div class="loader">جاري البحث...</div>';
  try{
    const res = await fetch(SHEET_API_URL + '?phone=' + encodeURIComponent(phone));
    const data = await res.json();
    lastOrders = (data.orders || []).map(o=>({
      ...o,
      total: Number(o.total)||0,
      paid: Number(o.paid)||0,
      remaining: Number(o.remaining)||0,
      items: JSON.parse(o.itemsJson || '[]')
    }));
    lastPhone = phone;
    renderResults();
  }catch(err){
    area.innerHTML = '<div class="empty-note">تعذّر الاتصال بالخادم، حاول مجددًا</div>';
    console.error(err);
  }
}

function renderResults(){
  const area = document.getElementById('resultsArea');
  if(lastOrders.length===0){
    area.innerHTML = '<div class="empty-note">لا توجد طلبات مسجلة بهذا الرقم.</div>';
    return;
  }
  const totalSpent = lastOrders.reduce((s,o)=>s+o.total,0);
  const totalDebt = lastOrders.reduce((s,o)=>s+o.remaining,0);

  let html = `<div class="summary">
    <div class="stat"><b>${lastOrders.length}</b><span>عدد الطلبات</span></div>
    <div class="stat"><b>${totalSpent.toLocaleString('ar-DZ')} دج</b><span>إجمالي المشتريات</span></div>
    <div class="stat debt"><b>${totalDebt.toLocaleString('ar-DZ')} دج</b><span>المبلغ المتبقي (الدين)</span></div>
  </div>`;

  html += lastOrders.map((o,idx)=>{
    const payClass = o.remaining<=0 ? 'pay-full' : (o.paid>0 ? 'pay-partial' : 'pay-none');
    const payLabel = o.remaining<=0 ? 'مدفوع بالكامل' : (o.paid>0 ? 'مدفوع جزئيًا' : 'غير مدفوع');
    const itemsHtml = o.items.map(it=>`<div><span>${escapeHtml(it.name)} × ${it.qty}</span><span>${(it.price*it.qty).toLocaleString('ar-DZ')} دج</span></div>`).join('');
    return `<div class="order-card">
      <div class="order-head">
        <b>طلب رقم #${o.id}</b>
        <span>${formatDate(o.date)}</span>
      </div>
      <div class="order-items">${itemsHtml}</div>
      <div class="order-foot">
        <span class="pay-tag ${payClass}">${payLabel}</span>
        <div style="font-size:13.5px;">الإجمالي: <b>${o.total.toLocaleString('ar-DZ')} دج</b> — المتبقي: <b>${o.remaining.toLocaleString('ar-DZ')} دج</b></div>
        <button class="btn btn-outline" onclick="printInvoice(${idx})">🖨️ طباعة الفاتورة</button>
      </div>
    </div>`;
  }).join('');

  area.innerHTML = html;
}

function printInvoice(idx){
  const o = lastOrders[idx];
  const itemsRows = o.items.map(it=>`<tr><td>${escapeHtml(it.name)}</td><td>${it.qty}</td><td>${it.price.toLocaleString('ar-DZ')} دج</td><td>${(it.price*it.qty).toLocaleString('ar-DZ')} دج</td></tr>`).join('');
  document.getElementById('invoiceArea').innerHTML = `
    <div class="invoice-box">
      <h2>فاتورة — الفخامة للدهن</h2>
      <div class="sub">رقم الطلب: #${o.id} &nbsp;|&nbsp; التاريخ: ${formatDate(o.date)}</div>
      <div style="font-size:14px;margin-bottom:10px;"><b>العميل:</b> ${escapeHtml(o.name||'')} &nbsp;|&nbsp; <b>الهاتف:</b> ${escapeHtml(o.phone||lastPhone)}</div>
      <table>
        <thead><tr><th>المنتج</th><th>الكمية</th><th>سعر الوحدة</th><th>الإجمالي</th></tr></thead>
        <tbody>${itemsRows}</tbody>
      </table>
      <div class="invoice-totals">
        <div><span>الإجمالي الكلي</span><b>${o.total.toLocaleString('ar-DZ')} دج</b></div>
        <div><span>المدفوع</span><b>${o.paid.toLocaleString('ar-DZ')} دج</b></div>
        <div style="border-top:1px solid #000;padding-top:6px;"><span>المتبقي (الدين)</span><b>${o.remaining.toLocaleString('ar-DZ')} دج</b></div>
      </div>
      <p style="text-align:center;color:#777;font-size:12px;margin-top:20px;">شكرًا لتعاملكم مع الفخامة للدهن</p>
    </div>`;
  setTimeout(()=>{ window.print(); }, 100);
}

function formatDate(d){
  try{ return new Date(d).toLocaleDateString('ar-DZ'); }catch(e){ return d || ''; }
}
function escapeHtml(str){
  return String(str??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
</script>
</body>
</html>
